<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Chi tiết trường — UniversityHub</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700;900&family=Be+Vietnam+Pro:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
:root{--ink:#0d0d0d;--cream:#faf8f3;--gold:#c9a84c;--gold-light:#e8d5a3;--mist:#e8e4dc;--text-muted:#6b6560}
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Be Vietnam Pro',sans-serif;background:var(--cream);color:var(--ink)}
nav{position:sticky;top:0;z-index:100;display:flex;align-items:center;justify-content:space-between;padding:1.2rem 3rem;background:rgba(250,248,243,.96);backdrop-filter:blur(12px);border-bottom:1px solid var(--mist)}
.logo{font-family:'Playfair Display',serif;font-size:1.3rem;font-weight:900;text-decoration:none;color:var(--ink)}
.logo span{color:var(--gold)}
.nav-links{display:flex;gap:2rem;list-style:none}
.nav-links a{font-size:.88rem;font-weight:500;color:var(--text-muted);text-decoration:none;transition:color .2s}
.nav-links a:hover{color:var(--gold)}
.school-selector-bar{background:white;border-bottom:1px solid var(--mist);padding:1rem 3rem;display:flex;align-items:center;gap:1rem;flex-wrap:wrap}
.school-selector-bar label{font-size:.85rem;font-weight:600;color:var(--text-muted)}
.school-select{padding:.65rem 1rem;border:1.5px solid var(--mist);border-radius:10px;outline:none;font-family:'Be Vietnam Pro',sans-serif;font-size:.9rem;background:white;cursor:pointer;min-width:320px;color:var(--ink)}
.school-select:focus{border-color:var(--gold)}
.uni-banner{background:linear-gradient(135deg,#0f0a04,#2d1e0a 60%,#1a0f05);padding:3rem 4rem;display:grid;grid-template-columns:auto 1fr auto;gap:2rem;align-items:center;color:white;position:relative;overflow:hidden}
.uni-banner::after{content:'';position:absolute;top:-50%;right:-10%;width:500px;height:500px;border-radius:50%;background:radial-gradient(circle,rgba(201,168,76,.12) 0%,transparent 70%)}
.uni-logo-big{width:80px;height:80px;background:linear-gradient(135deg,#5a3a14,#8a5a1e);border-radius:18px;display:flex;align-items:center;justify-content:center;font-family:'Playfair Display',serif;font-size:1.8rem;color:var(--gold);font-weight:700;border:2px solid rgba(201,168,76,.3);flex-shrink:0}
.uni-meta h1{font-family:'Playfair Display',serif;font-size:1.8rem;font-weight:700;margin-bottom:.4rem}
.uni-meta .subtitle{color:rgba(255,255,255,.6);font-size:.88rem;margin-bottom:.8rem}
.uni-tags{display:flex;gap:.5rem;flex-wrap:wrap}
.uni-tag{padding:.25rem .8rem;background:rgba(201,168,76,.2);border:1px solid rgba(201,168,76,.4);border-radius:100px;font-size:.75rem;color:var(--gold-light)}
.quick-stats{display:flex;gap:2rem;position:relative;z-index:1}
.qstat{text-align:center}
.qstat .val{font-family:'Playfair Display',serif;font-size:1.7rem;font-weight:700;color:var(--gold)}
.qstat .lbl{font-size:.7rem;color:rgba(255,255,255,.5);margin-top:.2rem;max-width:100px;line-height:1.3}
.tabs-bar{background:white;border-bottom:1px solid var(--mist);padding:0 4rem;display:flex;gap:0;position:sticky;top:73px;z-index:50;overflow-x:auto}
.tab-btn{padding:1rem 1.4rem;background:none;border:none;cursor:pointer;font-family:'Be Vietnam Pro',sans-serif;font-size:.86rem;font-weight:500;color:var(--text-muted);border-bottom:2.5px solid transparent;transition:all .2s;white-space:nowrap}
.tab-btn:hover{color:var(--gold)}
.tab-btn.active{color:var(--gold);border-bottom-color:var(--gold)}
.detail-layout{max-width:1100px;margin:0 auto;padding:2.5rem 2rem;display:grid;grid-template-columns:1fr 320px;gap:2.5rem;align-items:start}
.section{margin-bottom:2.5rem;scroll-margin-top:150px}
.section-heading{font-family:'Playfair Display',serif;font-size:1.3rem;font-weight:700;margin-bottom:1.2rem;padding-bottom:.7rem;border-bottom:2px solid var(--mist);display:flex;align-items:center;gap:.6rem}
.info-text{font-size:.93rem;color:#3d3830;line-height:1.85;margin-bottom:.9rem}
.info-text strong{color:var(--ink)}
.score-method-tabs{display:flex;gap:.5rem;margin-bottom:1rem;flex-wrap:wrap}
.sm-tab{padding:.45rem 1rem;background:var(--mist);border:none;border-radius:8px;cursor:pointer;font-family:'Be Vietnam Pro',sans-serif;font-size:.8rem;font-weight:600;color:var(--text-muted);transition:all .2s}
.sm-tab.active{background:var(--gold);color:white}
.score-panel{display:none}
.score-panel.active{display:block;animation:fadeIn .25s ease}
.score-table{width:100%;border-collapse:separate;border-spacing:0;border-radius:12px;overflow:hidden;border:1px solid var(--mist)}
.score-table th{background:#2d1e0a;color:var(--gold-light);padding:.8rem 1rem;text-align:left;font-size:.78rem;font-weight:600;letter-spacing:.4px}
.score-table td{padding:.78rem 1rem;font-size:.87rem;border-top:1px solid var(--mist);background:white;vertical-align:middle}
.score-table tr:hover td{background:#fffdf7}
.diem{font-family:'Playfair Display',serif;font-size:1.2rem;font-weight:700;color:var(--gold)}
.score-badge{display:inline-block;padding:.12rem .5rem;border-radius:4px;font-size:.7rem;font-weight:600}
.badge-a{background:#fff4e0;color:#8a5a1e}
.badge-b{background:#fff0ef;color:#c0392b}
.badge-c{background:#f0f7ff;color:#2563eb}
.badge-d{background:#f0fff4;color:#166534}
.note-text{font-size:.78rem;color:var(--text-muted);margin-top:.7rem;font-style:italic;padding:.6rem 1rem;background:#fffdf7;border-radius:8px;border-left:3px solid var(--gold)}
.admission-grid{display:grid;grid-template-columns:1fr 1fr;gap:.9rem}
.admission-card{padding:1.1rem;border:1px solid var(--mist);border-radius:12px;background:white}
.admission-card .method-name{font-weight:600;font-size:.86rem;margin-bottom:.3rem}
.admission-card .quota-pct{font-family:'Playfair Display',serif;font-size:1.4rem;color:var(--gold);font-weight:700}
.admission-card .detail{font-size:.78rem;color:var(--text-muted);margin-top:.4rem;line-height:1.5}
.scholarship-list{display:flex;flex-direction:column;gap:.9rem}
.scholarship-item{padding:1.1rem 1.4rem;background:white;border:1px solid var(--mist);border-radius:12px;border-left:3px solid var(--gold)}
.scholarship-item h4{font-size:.9rem;font-weight:600;margin-bottom:.3rem}
.scholarship-item p{font-size:.82rem;color:var(--text-muted)}
.sidebar-sticky{position:sticky;top:130px}
.info-card{background:white;border:1px solid var(--mist);border-radius:16px;padding:1.6rem;margin-bottom:1.2rem}
.info-card h3{font-size:.73rem;font-weight:600;color:var(--gold);letter-spacing:1.2px;text-transform:uppercase;margin-bottom:1rem}
.info-row{display:flex;justify-content:space-between;padding:.55rem 0;border-bottom:1px solid var(--mist);font-size:.86rem}
.info-row:last-child{border-bottom:none}
.info-row .key{color:var(--text-muted)}
.info-row .val{font-weight:600;text-align:right;max-width:60%}
.tuition-highlight{text-align:center;padding:1.2rem}
.tuition-highlight .range{font-family:'Playfair Display',serif;font-size:1.7rem;font-weight:700;color:var(--gold)}
.tuition-highlight .unit{font-size:.78rem;color:var(--text-muted);margin-top:.2rem}
.back-btn{display:flex;align-items:center;gap:.5rem;padding:.9rem 1.4rem;background:var(--ink);color:white;border-radius:10px;text-decoration:none;font-size:.88rem;font-weight:500;transition:background .2s;justify-content:center;width:100%;margin-top:.5rem}
.back-btn:hover{background:#2d1e0a}
.compare-btn{display:flex;align-items:center;gap:.5rem;padding:.85rem 1.4rem;background:white;color:var(--gold);border:2px solid var(--gold);border-radius:10px;text-decoration:none;font-size:.88rem;font-weight:500;transition:all .2s;justify-content:center;margin-bottom:.8rem;cursor:pointer;width:100%;font-family:'Be Vietnam Pro',sans-serif}
.compare-btn:hover{background:var(--gold);color:white}
@keyframes fadeIn{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
@media(max-width:900px){
  .uni-banner{grid-template-columns:auto 1fr;padding:2rem 1.5rem}
  .quick-stats{display:none}
  .tabs-bar,.school-selector-bar{padding-left:1rem;padding-right:1rem}
  .detail-layout{grid-template-columns:1fr;padding:1.5rem}
  .sidebar-sticky{position:static}
  .admission-grid{grid-template-columns:1fr}
  nav{padding:1rem 1.5rem}
}
</style>
</head>
<body>
<nav>
  <a href="index.html" class="logo">University<span>Hub</span></a>

let currentSchool='bkhn', currentTab='overview';

function loadSchool(key){
  currentSchool=key;
  const s=SCHOOLS[key];
  document.getElementById('bannerAbbr').textContent=s.abbr;
  document.getElementById('bannerName').textContent=s.name;
  document.getElementById('bannerSub').textContent=s.sub;
  document.getElementById('bannerTags').innerHTML=s.tags.map(t=>`<span class="uni-tag">${t}</span>`).join('');
  document.getElementById('bannerStats').innerHTML=(s.stats||[]).map(st=>`<div class="qstat"><div class="val">${st.val}</div><div class="lbl">${st.lbl}</div></div>`).join('');
  document.getElementById('sidebarTuitionRange').textContent=s.tuitionRange;
  document.getElementById('sidebarTuitionDetail').innerHTML=(s.tuitionDetail||[]).map(r=>`<div class="info-row"><span class="key">${r.k}</span><span class="val">${r.v}</span></div>`).join('');
  document.getElementById('sidebarInfo').innerHTML=(s.info||[]).map(r=>`<div class="info-row"><span class="key">${r.k}</span><span class="val">${r.v}</span></div>`).join('');
  renderTab(currentTab);
}

function switchTab(tabId,btn){
  currentTab=tabId;
  document.querySelectorAll('.tab-btn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  renderTab(tabId);
  setTimeout(()=>{
    const el=document.getElementById('section-'+tabId);
    if(el) el.scrollIntoView({behavior:'smooth',block:'start'});
  },60);
}

function renderTab(tabId){
  const s=SCHOOLS[currentSchool];
  let html='';
  if(tabId==='overview') html=renderOverview(s);
  else if(tabId==='admission') html=renderAdmission(s);
  else if(tabId==='scores') html=renderScores(s);
  else if(tabId==='scholarship') html=renderScholarship(s);
  document.getElementById('mainCol').innerHTML=html;
}

function renderOverview(s){
  return `<div class="section" id="section-overview"><div class="section-heading"><span>🏛️</span> Thông tin tổng quan</div>${s.overview}</div>`;
}

function renderAdmission(s){
  return `<div class="section" id="section-admission"><div class="section-heading"><span>📝</span> Phương thức tuyển sinh 2024</div><div class="admission-grid">${(s.admission||[]).map(a=>`<div class="admission-card"><div class="method-name">${a.method}</div><div class="quota-pct">${a.quota}</div><div class="detail">${a.detail}</div></div>`).join('')}</div></div>`;
}

function renderScores(s){
  const tabs=[], panels=[];
  if(s.scoresThpt){
    tabs.push(`<button class="sm-tab active" onclick="switchScoreTab('thpt',this)">🎓 THPT Quốc gia</button>`);
    panels.push(`<div class="score-panel active" id="sp-thpt">${buildScoreTable(s.scoresThpt)}</div>`);
  }
  if(s.scoresTsa){
    tabs.push(`<button class="sm-tab" onclick="switchScoreTab('tsa',this)">🔵 TSA (Đánh giá tư duy)</button>`);
    panels.push(`<div class="score-panel" id="sp-tsa">${buildScoreTable(s.scoresTsa)}${s.tsaNote?`<p class="note-text">⚠️ ${s.tsaNote}</p>`:''}</div>`);
  } else if(s.tsaNote){
    tabs.push(`<button class="sm-tab" onclick="switchScoreTab('tsa',this)">🔵 TSA</button>`);
    panels.push(`<div class="score-panel" id="sp-tsa"><p class="note-text">ℹ️ ${s.tsaNote}</p></div>`);
  }
  if(s.scoresHsa){
    tabs.push(`<button class="sm-tab" onclick="switchScoreTab('hsa',this)">🟢 HSA / APT</button>`);
    panels.push(`<div class="score-panel" id="sp-hsa">${buildScoreTable(s.scoresHsa)}${s.hsaNote?`<p class="note-text">ℹ️ ${s.hsaNote}</p>`:''}</div>`);
  } else if(s.hsaNote){
    tabs.push(`<button class="sm-tab" onclick="switchScoreTab('hsa',this)">🟢 HSA / APT</button>`);
    panels.push(`<div class="score-panel" id="sp-hsa"><p class="note-text">ℹ️ ${s.hsaNote}</p></div>`);
  }
  return `<div class="section" id="section-scores"><div class="section-heading"><span>📊</span> Bảng điểm chuẩn 2024</div><div class="score-method-tabs">${tabs.join('')}</div>${panels.join('')}</div>`;
}

function buildScoreTable(rows){
  const trs=rows.map(r=>{
    let badge='badge-a';
    if(r.toHop.startsWith('B'))badge='badge-b';
    else if(r.toHop.startsWith('C'))badge='badge-c';
    else if(r.toHop.startsWith('D')||r.toHop.startsWith('V'))badge='badge-d';
    else if(r.toHop.includes('HSA')||r.toHop.includes('APT')||r.toHop.includes('TSA'))badge='badge-d';
    return `<tr><td>${r.nganh}</td><td><span class="score-badge ${badge}">${r.toHop}</span></td><td><span class="diem">${r.diem}</span></td><td style="color:var(--text-muted);font-size:.8rem">${r.nam}</td></tr>`;
  }).join('');
  return `<table class="score-table"><thead><tr><th>Ngành đào tạo</th><th>Tổ hợp / Thang</th><th>Điểm chuẩn</th><th>Năm</th></tr></thead><tbody>${trs}</tbody></table>`;
}

function switchScoreTab(id,btn){
  document.querySelectorAll('.sm-tab').forEach(b=>b.classList.remove('active'));
  document.querySelectorAll('.score-panel').forEach(p=>p.classList.remove('active'));
  btn.classList.add('active');
  const panel=document.getElementById('sp-'+id);
  if(panel)panel.classList.add('active');
}

function renderScholarship(s){
  return `<div class="section" id="section-scholarship"><div class="section-heading"><span>🎖️</span> Học bổng</div><div class="scholarship-list">${(s.scholarships||[]).map(sc=>`<div class="scholarship-item"><h4>${sc.name}</h4><p>${sc.desc}</p></div>`).join('')}</div></div>`;
}

// Init
const urlP=new URLSearchParams(window.location.search);
const sc=urlP.get('school');
if(sc&&SCHOOLS[sc]){document.getElementById('schoolSelect').value=sc;loadSchool(sc);}
else loadSchool('bkhn');
</script>
