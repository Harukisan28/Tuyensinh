<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Chi tiết trường — TuyenSinh367</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700;900&family=Be+Vietnam+Pro:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
:root{--ink:#0d0d0d;--cream:#faf8f3;--gold:#c9a84c;--gold-l:#e8d5a3;--mist:#e8e4dc;--mu:#6b6560;--green:#166534;--blue:#1e40af}
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Be Vietnam Pro',sans-serif;background:var(--cream);color:var(--ink)}
a{text-decoration:none;color:inherit}
footer {
  background: #1a1208; color: white;
  padding: 3rem 6rem;
  display: flex; align-items: center; justify-content: space-between;
}
.footer-logo { font-family: 'Playfair Display', serif; font-size: 1.2rem; font-weight: 900; text-decoration: none; color: white; }
.footer-logo span { color: var(--gold); }
.footer-links { display: flex; gap: 2rem; }
.footer-links a { font-size: 0.85rem; color: rgba(255,255,255,0.5); text-decoration: none; transition: color 0.2s; }
.footer-links a:hover { color: var(--gold); }
.footer-copy { font-size: 0.8rem; color: rgba(255,255,255,0.4); }

@media (max-width: 900px) {
  .mission-grid, .contact-grid { grid-template-columns: 1fr; }
  .values-grid { grid-template-columns: 1fr; }
  .team-grid { grid-template-columns: 1fr 1fr; }
  .about-hero, .mission, .values, .team, .contact, footer { padding: 3rem 1.5rem; }
  nav { padding: 1rem 1.5rem; }
  footer { flex-direction: column; gap: 1.5rem; text-align: center; }
}
/* ── NAV ── */
nav{position:sticky;top:0;z-index:200;display:flex;align-items:center;justify-content:space-between;padding:1rem 3rem;background:rgba(250,248,243,.97);backdrop-filter:blur(12px);border-bottom:1px solid var(--mist)}
.logo{font-family:'Playfair Display',serif;font-size:1.3rem;font-weight:900;color:var(--ink)}.logo span{color:var(--gold)}
.nav-links{display:flex;gap:2rem;list-style:none}.nav-links a{font-size:.88rem;font-weight:500;color:var(--mu);transition:color .2s}.nav-links a:hover{color:var(--gold)}

/* ── SCHOOL SELECTOR ── */
.school-bar{background:white;border-bottom:1px solid var(--mist);padding:.75rem 3rem;display:flex;align-items:center;gap:.8rem}
.school-bar label{font-size:.82rem;font-weight:600;color:var(--mu);white-space:nowrap}
#schoolSel{padding:.55rem 1rem;border:1.5px solid var(--mist);border-radius:9px;outline:none;font-family:inherit;font-size:.88rem;background:white;cursor:pointer;min-width:330px;color:var(--ink)}.school-sel:focus,#schoolSel:focus{border-color:var(--gold)}

/* ── BANNER ── */
.banner{background:linear-gradient(135deg,#0f0a04,#2d1e0a 55%,#1a0f05);padding:2.5rem 4rem;display:grid;grid-template-columns:auto 1fr auto;gap:2rem;align-items:center;color:white;position:relative;overflow:hidden}
.banner::after{content:'';position:absolute;top:-40%;right:-8%;width:420px;height:420px;border-radius:50%;background:radial-gradient(circle,rgba(201,168,76,.13),transparent 70%)}
.logo-box{width:72px;height:72px;background:linear-gradient(135deg,#5a3a14,#8a5a1e);border-radius:15px;display:flex;align-items:center;justify-content:center;font-family:'Playfair Display',serif;font-size:1.6rem;color:var(--gold);font-weight:700;border:2px solid rgba(201,168,76,.3);flex-shrink:0}
.bm h1{font-family:'Playfair Display',serif;font-size:1.65rem;font-weight:700;margin-bottom:.3rem}
.bm .bsub{color:rgba(255,255,255,.6);font-size:.84rem;margin-bottom:.65rem}
.btags{display:flex;gap:.4rem;flex-wrap:wrap}
.btag{padding:.18rem .7rem;background:rgba(201,168,76,.2);border:1px solid rgba(201,168,76,.4);border-radius:100px;font-size:.71rem;color:var(--gold-l)}
.bstats{display:flex;gap:1.8rem;position:relative;z-index:1}
.bst .v{font-family:'Playfair Display',serif;font-size:1.5rem;font-weight:700;color:var(--gold)}
.bst .l{font-size:.67rem;color:rgba(255,255,255,.5);margin-top:.1rem;max-width:90px;line-height:1.3}

/* ── TABS ── */
.tabs{background:white;border-bottom:1px solid var(--mist);padding:0 4rem;display:flex;position:sticky;top:65px;z-index:100;overflow-x:auto}
.tb{padding:.9rem 1.3rem;background:none;border:none;cursor:pointer;font-family:inherit;font-size:.84rem;font-weight:500;color:var(--mu);border-bottom:2.5px solid transparent;transition:all .2s;white-space:nowrap}
.tb:hover{color:var(--gold)}.tb.on{color:var(--gold);border-bottom-color:var(--gold)}

/* ── PAGE BODY ── */
.page{max-width:1200px;margin:0 auto;padding:2rem}

/* ── OVERVIEW: 2-col layout ── */
.ov-layout{display:grid;grid-template-columns:1fr 285px;gap:2rem;align-items:start}

/* ── SECTIONS ── */
.sec{margin-bottom:2.2rem}
.sh{font-family:'Playfair Display',serif;font-size:1.18rem;font-weight:700;margin-bottom:1rem;padding-bottom:.55rem;border-bottom:2px solid var(--mist);display:flex;align-items:center;gap:.45rem}
.it{font-size:.91rem;color:#3d3830;line-height:1.88;margin-bottom:.75rem}.it strong{color:var(--ink)}

/* ── SIDEBAR ── */
.sdb{position:sticky;top:125px}
.icard{background:white;border:1px solid var(--mist);border-radius:13px;padding:1.3rem;margin-bottom:.9rem}
.icard h3{font-size:.68rem;font-weight:600;color:var(--gold);letter-spacing:1.2px;text-transform:uppercase;margin-bottom:.8rem}
.ir{display:flex;justify-content:space-between;padding:.47rem 0;border-bottom:1px solid var(--mist);font-size:.84rem}.ir:last-child{border-bottom:none}
.ik{color:var(--mu)}.iv{font-weight:600;text-align:right;font-size:.82rem}
.tc-fee{text-align:center;padding:.6rem 0 .3rem}
.fee-big{font-family:'Playfair Display',serif;font-size:1.5rem;font-weight:700;color:var(--gold)}
.fee-small{font-size:.72rem;color:var(--mu);margin-top:.1rem}
.sbtns{display:flex;flex-direction:column;gap:.6rem}
.btn-cmp{padding:.75rem;background:white;color:var(--gold);border:2px solid var(--gold);border-radius:9px;font-family:inherit;font-size:.84rem;font-weight:600;cursor:pointer;transition:all .2s}.btn-cmp:hover{background:var(--gold);color:white}
.btn-bk{padding:.75rem;background:var(--ink);color:white;border-radius:9px;font-size:.84rem;display:block;text-align:center;transition:background .2s}.btn-bk:hover{background:#2d1e0a}

/* ── ADMISSION GRID ── */
.adm-grid{display:grid;grid-template-columns:1fr 1fr;gap:.7rem;margin-bottom:1.8rem}
.ac{padding:1rem 1.1rem;border:1px solid var(--mist);border-radius:11px;background:white}
.ac .mn{font-weight:600;font-size:.84rem;margin-bottom:.2rem}
.ac .qp{font-family:'Playfair Display',serif;font-size:1.25rem;color:var(--gold);font-weight:700}
.ac .dd{font-size:.76rem;color:var(--mu);margin-top:.3rem;line-height:1.5}

/* ── SCORE TABLE (gộp THPT+TSA/HSA) ── */
.stool{display:flex;gap:.6rem;margin-bottom:.8rem;flex-wrap:wrap;align-items:center}
.stool input,.stool select{padding:.52rem .9rem;border:1.5px solid var(--mist);border-radius:8px;outline:none;font-family:inherit;font-size:.83rem;background:white}
.stool input{flex:1;min-width:180px}.stool input:focus,.stool select:focus{border-color:var(--gold)}
.scnt{font-size:.77rem;color:var(--mu);white-space:nowrap}

.stbl{width:100%;border-collapse:separate;border-spacing:0;border-radius:11px;overflow:hidden;border:1px solid var(--mist);font-size:.83rem}
.stbl th{background:#2d1e0a;color:var(--gold-l);padding:.68rem .85rem;text-align:left;font-size:.73rem;font-weight:600;white-space:nowrap}
.stbl td{padding:.65rem .85rem;border-top:1px solid var(--mist);background:white;vertical-align:middle}
.stbl tr:hover td{background:#fffdf7}
.stbl tr.empty td{text-align:center;color:var(--mu);padding:2rem}

.sc-thpt{font-family:'Playfair Display',serif;font-size:1.1rem;font-weight:700;color:var(--gold)}
.sc-tsa{font-family:'Playfair Display',serif;font-size:1.05rem;font-weight:700;color:var(--blue)}
.sc-hsa{font-family:'Playfair Display',serif;font-size:1.05rem;font-weight:700;color:var(--green)}
.sc-na{color:var(--mu);font-size:.78rem}

.bdg{display:inline-block;padding:.09rem .42rem;border-radius:4px;font-size:.67rem;font-weight:600}
.ba{background:#fff4e0;color:#8a5a1e}.bb{background:#fff0ef;color:#c0392b}
.bc{background:#f0f7ff;color:var(--blue)}.bd{background:#f0fff4;color:var(--green)}.bx{background:#f5f0ff;color:#6b21a8}
.tct{background:#e0f2fe;color:#0369a1;font-size:.66rem;padding:.07rem .38rem;border-radius:3px;font-weight:600;margin-left:.25rem;vertical-align:middle}

.legend{display:flex;gap:.8rem;flex-wrap:wrap;margin-bottom:.75rem;font-size:.75rem;color:var(--mu);align-items:center}
.lgi{display:flex;align-items:center;gap:.3rem}
.lgd{width:10px;height:10px;border-radius:2px;flex-shrink:0}
.note{font-size:.76rem;color:var(--mu);margin-top:.6rem;padding:.5rem .85rem;background:#fffdf7;border-radius:7px;border-left:3px solid var(--gold);font-style:italic}

/* ── IELTS TABLE ── */
.ielts-t{width:100%;border-collapse:collapse;border-radius:10px;overflow:hidden;border:1px solid var(--mist)}
.ielts-t th{background:#1e3a5f;color:white;padding:.6rem 1rem;text-align:center;font-size:.75rem}
.ielts-t td{padding:.55rem 1rem;border-top:1px solid var(--mist);text-align:center;background:white;font-size:.84rem}
.ielts-t tr:hover td{background:#f0f7ff}

/* ── SCHOLARSHIP ── */
.schlist{display:flex;flex-direction:column;gap:.75rem}
.sci{padding:1rem 1.2rem;background:white;border:1px solid var(--mist);border-radius:11px;border-left:3px solid var(--gold)}
.sci h4{font-size:.88rem;font-weight:600;margin-bottom:.22rem}.sci p{font-size:.8rem;color:var(--mu)}

@keyframes fi{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
.anim{animation:fi .22s ease}

@media(max-width:900px){
  .banner{grid-template-columns:auto 1fr;padding:2rem 1.5rem}.bstats{display:none}
  .tabs,.school-bar{padding-left:1rem;padding-right:1rem}
  .ov-layout,.adm-grid{grid-template-columns:1fr}
  .sdb{position:static}.page{padding:1.2rem}
  nav{padding:1rem 1.5rem}
}
</style>
</head>

/* ════════════════════════════════════════
   STATE & INIT
════════════════════════════════════════ */
let cur = 'bkhn', tab = 'ov';

function load(k) {
  cur = k;
  const s = D[k];
  document.getElementById('bAbbr').textContent = s.abbr;
  document.getElementById('bName').textContent = s.name;
  document.getElementById('bSub').textContent  = s.sub;
  document.getElementById('bTags').innerHTML   = s.tags.map(t=>`<span class="btag">${t}</span>`).join('');
  document.getElementById('bStats').innerHTML  = (s.stats||[]).map(x=>`<div class="bst"><div class="v">${x.v}</div><div class="l">${x.l}</div></div>`).join('');
  render(tab);
}

function sw(t, btn) {
  tab = t;
  document.querySelectorAll('.tb').forEach(b=>b.classList.remove('on'));
  btn.classList.add('on');
  render(t);
  setTimeout(()=>window.scrollTo({top:document.querySelector('.tabs').offsetTop-5,behavior:'smooth'}),50);
}

function render(t) {
  const s = D[cur];
  let h = '';
  if      (t==='ov') h = rOv(s);
  else if (t==='sc') h = rSc(s);
  else if (t==='ts') h = rTs(s);
  document.getElementById('pageBody').innerHTML = `<div class="anim">${h}</div>`;
  if (t==='sc') setTimeout(fsc, 0);
}

/* ── SIDEBAR (only in overview) ── */
function sidebar(s) {
  return `<div class="sdb">
    <div class="icard">
      <h3>Học phí 2024–2025</h3>
      <div class="tc-fee">
        <div class="fee-big">${s.tuR}</div>
        <div class="fee-small">triệu đồng / năm học</div>
      </div>
      ${(s.tuD||[]).map(r=>`<div class="ir"><span class="ik">${r.k}</span><span class="iv">${r.v}</span></div>`).join('')}
    </div>
    <div class="icard">
      <h3>Thông tin chung</h3>
      ${(s.info||[]).map(r=>`<div class="ir"><span class="ik">${r.k}</span><span class="iv">${r.v}</span></div>`).join('')}
    </div>
    <div class="sbtns">
      <button class="btn-cmp" onclick="location.href='compare.html'">⚖️ So sánh trường này</button>
      <a href="filter.html" class="btn-bk">← Quay lại danh sách</a>
    </div>
  </div>`;
}

/* ── OVERVIEW ── */
function rOv(s) {
  return `<div class="ov-layout">
    <div>
      <div class="sec">
        <div class="sh">🏛️ Tổng quan</div>
        ${s.ov}
      </div>
    </div>
    ${sidebar(s)}
  </div>`;
}

/* ── SCORES (gộp THPT + TSA/HSA) ── */
function rSc(s) {
  const hasTSA = s.sc.some(r => r.tsa != null);
  const hasHSA = s.sc.some(r => r.hsa != null);
  const col2lbl = hasTSA ? 'Điểm TSA' : (hasHSA ? (cur==='ueh'||cur==='uit' ? 'Điểm APT (thang 1200)' : 'Điểm HSA (thang 150)') : null);

  const groups = [...new Set(s.sc.map(r=>r.g))];

  const legend = `<div class="legend">
    <span style="font-weight:600;color:var(--ink)">Tổ hợp:</span>
    <span class="lgi"><span class="lgd" style="background:#fff4e0"></span>A (Toán–Lý…)</span>
    <span class="lgi"><span class="lgd" style="background:#fff0ef"></span>B (Toán–Hóa–Sinh)</span>
    <span class="lgi"><span class="lgd" style="background:#f0f7ff"></span>C (Văn–Sử–Địa)</span>
    <span class="lgi"><span class="lgd" style="background:#f0fff4"></span>D/V (Ngoại ngữ)</span>
    <span class="lgi"><span class="tct" style="font-size:.72rem;padding:.12rem .5rem">TT</span> Tiên tiến/CLC</span>
    ${hasTSA ? `<span class="lgi" style="color:var(--blue);font-weight:600">■ Xanh dương = TSA</span>` : ''}
    ${hasHSA ? `<span class="lgi" style="color:var(--green);font-weight:600">■ Xanh lá = HSA/APT</span>` : ''}
  </div>`;

  return `<div class="sec">
    <div class="sh">📊 Bảng điểm chuẩn 2025</div>
    <div class="stool">
      <input type="text" id="sq" placeholder="🔍 Tìm tên ngành..." oninput="fsc()">
      <select id="sg" onchange="fsc()">
        <option value="">Tất cả nhóm ngành</option>
        ${groups.map(g=>`<option value="${g}">${g}</option>`).join('')}
      </select>
      <span class="scnt" id="scnt"></span>
    </div>
    ${legend}
    <table class="stbl">
      <thead><tr>
        <th>Tên ngành / Chương trình</th>
        <th>Tổ hợp xét tuyển</th>
        <th>Điểm THPT 2025</th>
        ${col2lbl ? `<th>${col2lbl}</th>` : ''}
        <th>Nhóm ngành</th>
      </tr></thead>
      <tbody id="stbody"></tbody>
    </table>
    <p class="note">ℹ️ ${s.tsaN}</p>
  </div>
  ${(s.ielts && s.ielts.length) ? `
  <div class="sec">
    <div class="sh">🌐 Quy đổi IELTS → Điểm Tiếng Anh THPT</div>
    <table class="ielts-t">
      <thead><tr><th>Điểm IELTS</th><th>Điểm Tiếng Anh THPT (thang 10) / Ghi chú</th></tr></thead>
      <tbody>${(s.ielts||[]).map(r=>`<tr><td><strong>${r.b}</strong></td><td>${r.a}</td></tr>`).join('')}</tbody>
    </table>
    <p class="note">ℹ️ ${s.iNote}</p>
  </div>` : ''}`;
}

function fsc() {
  const s = D[cur];
  const hasTSA = s.sc.some(r=>r.tsa!=null);
  const hasHSA = s.sc.some(r=>r.hsa!=null);
  const col2k  = hasTSA ? 'tsa' : (hasHSA ? 'hsa' : null);
  const q  = (document.getElementById('sq')?.value||'').toLowerCase();
  const g  = document.getElementById('sg')?.value||'';
  const rows = s.sc.filter(r=>(!q||r.n.toLowerCase().includes(q)||(r.g||'').toLowerCase().includes(q))&&(!g||r.g===g));
  const tbody = document.getElementById('stbody');
  if (!tbody) return;

  if (!rows.length) {
    tbody.innerHTML = `<tr class="empty"><td colspan="6">Không tìm thấy ngành — thử từ khóa khác</td></tr>`;
    document.getElementById('scnt').textContent = '0 ngành';
    return;
  }

  tbody.innerHTML = rows.map(r => {
    const th = r.th||'';
    let bc = 'ba';
    if (th.startsWith('B')) bc='bb'; else if (th.startsWith('C')) bc='bc'; else if (th.startsWith('D')||th.startsWith('V')) bc='bd';
    const isCT = /TT\)|tiên tiến|CLC|TROY|PFIEV|hợp tác|ĐH \(/.test(r.n);
    const c2 = col2k
      ? (r[col2k] != null
          ? `<td><span class="${col2k==='tsa'?'sc-tsa':'sc-hsa'}">${r[col2k]}</span></td>`
          : `<td><span class="sc-na">—</span></td>`)
      : '';
    return `<tr>
      <td>${r.n}${isCT?`<span class="tct">TT</span>`:''}</td>
      <td><span class="bdg ${bc}">${th}</span></td>
      <td><span class="sc-thpt">${r.thpt}</span></td>
      ${c2}
      <td style="font-size:.77rem;color:var(--mu)">${r.g||''}</td>
    </tr>`;
  }).join('');
  document.getElementById('scnt').textContent = `${rows.length} ngành`;
}

/* ── TUYỂN SINH + HỌC BỔNG (gộp) ── */
function rTs(s) {
  return `
  <div class="sec">
    <div class="sh">📝 Phương thức tuyển sinh 2025</div>
    <div class="adm-grid">${(s.adm||[]).map(a=>`
      <div class="ac">
        <div class="mn">${a.m}</div>
        <div class="qp">${a.q}</div>
        <div class="dd">${a.d}</div>
      </div>`).join('')}
    </div>
  </div>
  <div class="sec">
    <div class="sh">🎖️ Học bổng &amp; Hỗ trợ tài chính</div>
    <div class="schlist">${(s.schols||[]).map(x=>`
      <div class="sci"><h4>${x.n}</h4><p>${x.d}</p></div>`).join('')}
    </div>
  </div>`;
}

/* ── BOOT ── */
(function(){
  const p = new URLSearchParams(window.location.search);
  const sc = p.get('school');
  if (sc && D[sc]) { document.getElementById('schoolSel').value = sc; load(sc); }
  else load('bkhn');
})();
</script>
